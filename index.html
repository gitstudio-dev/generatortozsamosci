<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Generator Danych PL - Wersja Finalna</title>
    <style>
        :root { --primary: #dc2626; --secondary: #2563eb; --bg: #f1f5f9; --success: #16a34a; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); padding: 20px; display: flex; justify-content: center; }
        .box { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 650px; }
        h2 { margin-top: 0; color: #64748b; font-size: 1rem; border-bottom: 2px solid #f1f5f9; padding-bottom: 10px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .item { background: #f8fafc; padding: 12px; border-radius: 12px; border: 1px solid #e2e8f0; }
        .label { font-size: 0.65rem; color: #94a3b8; font-weight: 700; text-transform: uppercase; }
        .val { font-family: 'Courier New', monospace; font-size: 1rem; color: var(--secondary); font-weight: 800; display: block; margin-top: 4px; }
        .full { grid-column: span 2; }
        button { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: 600; margin-top: 20px; transition: 0.3s; }
        button:hover { filter: brightness(1.2); }
        .bank-tag { font-size: 0.7rem; color: #16a34a; font-weight: bold; }
    </style>
</head>
<body>

<div class="box">
    <h2>GENERATOR DANYCH OSOBOWYCH I FIRMOWYCH</h2>
    <div class="grid">
        <div class="item"><span class="label">PESEL</span><span id="g-pesel" class="val">---</span></div>
        <div class="item"><span class="label">Dowód Osobisty</span><span id="g-id" class="val">---</span></div>
        <div class="item"><span class="label">NIP</span><span id="g-nip" class="val">---</span></div>
        <div class="item"><span class="label">KRS</span><span id="g-krs" class="val">---</span></div>
        <div class="item"><span class="label">REGON 9</span><span id="g-regon9" class="val">---</span></div>
        <div class="item"><span class="label">REGON 14</span><span id="g-regon14" class="val">---</span></div>
        <div class="item full">
            <span class="label">KONTO BANKOWE (IBAN PL) - <span id="bank-name" class="bank-tag">...</span></span>
            <span id="g-iban" class="val">---</span>
        </div>
        <div class="item full"><span class="label">MIKRORACHUNEK PODATKOWY (NA PODSTAWIE PESEL)</span><span id="g-tax-p" class="val">---</span></div>
        <div class="item full"><span class="label">MIKRORACHUNEK PODATKOWY (NA PODSTAWIE NIP)</span><span id="g-tax-n" class="val">---</span></div>
    </div>
    <button onclick="generateAll()">GENERUJ NOWY KOMPLET DANYCH</button>
</div>

<script>
    const bankList = [
        {c: "1010", n: "Narodowy Bank Polski"}, {c: "1020", n: "PKO BP"}, {c: "1030", n: "Bank Handlowy (Citi)"},
        {c: "1050", n: "ING Bank Śląski"}, {c: "1090", n: "Santander Bank Polska"}, {c: "1140", n: "mBank"},
        {c: "1160", n: "Bank Millennium"}, {c: "1240", n: "Pekao SA"}, {c: "1320", n: "Bank Pocztowy"},
        {c: "1540", n: "BOŚ Bank"}, {c: "1600", n: "BNP Paribas"}, {c: "2120", n: "Santander Consumer Bank"},
        {c: "2490", n: "Alior Bank"}
    ];

    // Funkcja Modulo dla bardzo dużych liczb (IBAN)
    function ibanModulo(string) {
        return BigInt(string) % 97n;
    }

    function calculateIbanChecksum(bban) {
        const converted = bban + "252100"; // 25=P, 21=L
        const remainder = ibanModulo(converted);
        const checksum = 98n - remainder;
        return checksum.toString().padStart(2, '0');
    }

    function genPESEL() {
        const date = new Date(1950 + Math.random() * 75, Math.floor(Math.random() * 12), Math.floor(Math.random() * 28) + 1);
        let y = date.getFullYear(), m = date.getMonth() + 1, d = date.getDate();
        if (y >= 2000) m += 20;
        const digits = [Math.floor((y%100)/10), y%10, Math.floor(m/10), m%10, Math.floor(d/10), d%10, ...Array.from({length: 4}, () => Math.floor(Math.random()*10))];
        const w = [1, 3, 7, 9, 1, 3, 7, 9, 1, 3];
        let sum = digits.reduce((acc, v, i) => acc + v * w[i], 0);
        digits.push((10 - (sum % 10)) % 10);
        return digits.join('');
    }

    function genNIP() {
        const w = [6, 5, 7, 2, 3, 4, 5, 6, 7];
        while(true) {
            const d = Array.from({length: 9}, () => Math.floor(Math.random() * 10));
            let sum = d.reduce((acc, v, i) => acc + v * w[i], 0);
            if (sum % 11 !== 10) return d.join('') + (sum % 11);
        }
    }

    function genRegons() {
        const w9 = [8, 9, 2, 3, 4, 5, 6, 7];
        const d9 = Array.from({length: 8}, () => Math.floor(Math.random() * 10));
        let c9 = d9.reduce((acc, v, i) => acc + v * w9[i], 0) % 11;
        d9.push(c9 === 10 ? 0 : c9);
        const r9 = d9.join('');
        const d14 = [...d9, ...Array.from({length: 4}, () => Math.floor(Math.random() * 10))];
        const w14 = [2, 4, 8, 5, 0, 9, 7, 3, 6, 1, 2, 4, 8];
        let c14 = d14.reduce((acc, v, i) => acc + v * w14[i], 0) % 11;
        d14.push(c14 === 10 ? 0 : c14);
        return { r9, r14: d14.join('') };
    }

    function genID() {
        const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
        const l = Array.from({length: 3}, () => letters[Math.floor(Math.random() * 26)]);
        const d = Array.from({length: 5}, () => Math.floor(Math.random() * 10));
        const map = (c) => c.charCodeAt(0) - 55;
        const w = [7, 3, 1, 7, 3, 1, 7, 3];
        const vals = [...l.map(map), ...d];
        let sum = vals.reduce((acc, v, i) => acc + v * w[i], 0);
        return `${l.join('')}${sum % 10}${d.join('')}`;
    }

    function generateAll() {
        const pesel = genPESEL();
        const nip = genNIP();
        const regons = genRegons();
        const bank = bankList[Math.floor(Math.random() * bankList.length)];
        
        // Generowanie IBAN
        const bban = bank.c + "0000" + Math.random().toString().slice(2, 14);
        const iban = "PL" + calculateIbanChecksum(bban) + bban;

        // Mikrorachunki (Stały człon 10100071 + 222 + typ(1-P/2-N) + id)
        const taxP_BBAN = "101000712221" + pesel.padStart(13, '0');
        const taxN_BBAN = "101000712222" + nip.padStart(13, '0');

        document.getElementById('g-pesel').innerText = pesel;
        document.getElementById('g-id').innerText = genID();
        document.getElementById('g-nip').innerText = nip;
        document.getElementById('g-krs').innerText = Math.floor(Math.random()*1000000).toString().padStart(10, '0');
        document.getElementById('g-regon9').innerText = regons.r9;
        document.getElementById('g-regon14').innerText = regons.r14;
        document.getElementById('g-iban').innerText = iban.replace(/(.{4})/g, '$1 ');
        document.getElementById('bank-name').innerText = bank.n;
        document.getElementById('g-tax-p').innerText = "PL" + calculateIbanChecksum(taxP_BBAN) + taxP_BBAN;
        document.getElementById('g-tax-n').innerText = "PL" + calculateIbanChecksum(taxN_BBAN) + taxN_BBAN;
    }
</script>

</body>
</html>
